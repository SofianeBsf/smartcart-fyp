# Render.com Blueprint – SmartCart FYP
# Deploy with: https://render.com/deploy → paste your GitHub repo URL

services:
  # ── Node App (Express + React) ──────────────────────────────────────
  - type: web
    name: smartcart-app
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # you'll paste your Neon URL here
      - key: JWT_SECRET
        generateValue: true  # Render generates a random secret
      - key: BUILT_IN_FORGE_API_URL
        sync: false          # paste your Gemini API URL
      - key: BUILT_IN_FORGE_API_KEY
        sync: false          # paste your Gemini API key
    healthCheckPath: /
